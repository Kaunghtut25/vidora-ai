<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Sign In — Vidora AI</title>
<style>
  :root { --purple:#8B5CF6; --cyan:#06B6D4; --bg:#050508; --surface:#111118; --border:#1F1F2E; --text:#fff; --text2:#A1A1AA; --text3:#71717A; }
  *{margin:0;padding:0;box-sizing:border-box} body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
  body::before{content:'';position:absolute;top:-200px;left:50%;transform:translateX(-50%);width:600px;height:600px;background:rgba(139,92,246,.08);border-radius:50%;filter:blur(120px)}
  body::after{content:'';position:absolute;bottom:-200px;left:50%;transform:translateX(-50%);width:500px;height:500px;background:rgba(6,182,212,.06);border-radius:50%;filter:blur(100px)}
  .card{position:relative;z-index:1;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:40px;width:100%;max-width:420px;margin:24px}
  .card h1{font-size:28px;font-weight:900;text-align:center;margin-bottom:4px}
  .card .sub{color:var(--text3);text-align:center;font-size:14px;margin-bottom:32px}
  .field{margin-bottom:18px}
  .field label{display:block;font-size:13px;color:var(--text2);margin-bottom:6px;font-weight:500}
  .field input{width:100%;padding:12px 16px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:12px;color:#fff;font-size:14px;font-family:inherit}
  .field input:focus{outline:none;border-color:var(--purple)}
  .field .hint{font-size:12px;color:var(--text3);margin-top:6px}
  .btn{width:100%;padding:12px;border-radius:12px;font-size:15px;font-weight:600;border:none;cursor:pointer;transition:all .2s;background:linear-gradient(135deg,var(--purple),var(--cyan));color:#fff;margin-top:8px}
  .btn:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(139,92,246,.4)}
  .divider{display:flex;align-items:center;gap:12px;color:var(--text3);font-size:12px;margin:24px 0}
  .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
  .social-btn{width:100%;padding:10px;border-radius:12px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:8px;transition:all .2s}
  .social-btn:hover{border-color:var(--purple);color:#fff}
  .card .footer{text-align:center;font-size:14px;color:var(--text3);margin-top:24px}
  .card .footer a{color:var(--purple);text-decoration:none;font-weight:600}
  .card .footer a:hover{text-decoration:underline}
  .back{position:absolute;top:24px;left:24px;color:var(--text3);text-decoration:none;font-size:14px;z-index:10}
  .back:hover{color:#fff}
</style></head>
<body>

<a href="index.html" class="back">← Home</a>

<div class="card">
  <h1>Welcome Back</h1>
  <p class="sub">Sign in to your Vidora account</p>
  <form onsubmit="event.preventDefault();window.location.href='index.html'">
    <div class="field"><label>Email</label><input type="email" required placeholder="you@example.com"></div>
    <div class="field">
      <label>Password</label>
      <input type="password" required placeholder="••••••••">
      <p class="hint">Demo: <code style="color:var(--purple)">admin@vidora.ai</code> / <code style="color:var(--purple)">admin123</code></p>
    </div>
    <button type="submit" class="btn">Sign In</button>
  </form>
  <div class="divider">or continue with</div>
  <button class="social-btn" onclick="window.location.href='index.html'">🔵 Google</button>
  <button class="social-btn" onclick="window.location.href='index.html'">🐙 GitHub</button>
  <p class="footer">Don't have an account? <a href="signup.html">Sign up →</a></p>
</div>

</body></html>
