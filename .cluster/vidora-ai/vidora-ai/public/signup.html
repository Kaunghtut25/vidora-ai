<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Sign Up — Vidora AI</title>
<style>
  :root { --purple:#8B5CF6; --cyan:#06B6D4; --green:#10B981; --bg:#050508; --surface:#111118; --border:#1F1F2E; --text:#fff; --text2:#A1A1AA; --text3:#71717A; }
  *{margin:0;padding:0;box-sizing:border-box} body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
  body::before{content:'';position:absolute;top:-200px;left:50%;transform:translateX(-50%);width:600px;height:600px;background:rgba(139,92,246,.08);border-radius:50%;filter:blur(120px)}
  .card{position:relative;z-index:1;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:40px;width:100%;max-width:440px;margin:24px}
  .card h1{font-size:28px;font-weight:900;text-align:center;margin-bottom:4px}
  .card .sub{color:var(--text3);text-align:center;font-size:14px;margin-bottom:28px}
  .steps{display:flex;justify-content:center;gap:8px;margin-bottom:24px}
  .step-dot{width:8px;height:8px;border-radius:50%;background:var(--border)}.step-dot.active{background:var(--purple);width:24px;border-radius:4px}
  .field{margin-bottom:16px}
  .field label{display:block;font-size:13px;color:var(--text2);margin-bottom:6px;font-weight:500}
  .field input,.field select{width:100%;padding:12px 16px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:12px;color:#fff;font-size:14px;font-family:inherit}
  .field input:focus,.field select:focus{outline:none;border-color:var(--purple)}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .btn{width:100%;padding:12px;border-radius:12px;font-size:15px;font-weight:600;border:none;cursor:pointer;transition:all .2s;background:linear-gradient(135deg,var(--purple),var(--cyan));color:#fff;margin-top:8px}
  .btn:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(139,92,246,.4)}
  .check{display:flex;align-items:flex-start;gap:8px;margin:16px 0;font-size:13px;color:var(--text2)}
  .check input{margin-top:3px;accent-color:var(--purple)}
  .card .footer{text-align:center;font-size:14px;color:var(--text3);margin-top:20px}
  .card .footer a{color:var(--purple);text-decoration:none;font-weight:600}
  .benefit{display:flex;align-items:center;gap:8px;padding:8px 0;color:var(--green);font-size:13px;font-weight:600}
  .back{position:absolute;top:24px;left:24px;color:var(--text3);text-decoration:none;font-size:14px;z-index:10}.back:hover{color:#fff}
</style></head>
<body>

<a href="index.html" class="back">← Home</a>

<div class="card">
  <h1>Create Your Account</h1>
  <p class="sub">Start creating AI videos in minutes</p>
  <div class="steps"><div class="step-dot active"></div><div class="step-dot"></div><div class="step-dot"></div></div>
  <form onsubmit="event.preventDefault();window.location.href='index.html'">
    <div class="row">
      <div class="field"><label>First Name</label><input type="text" required placeholder="Ko"></div>
      <div class="field"><label>Last Name</label><input type="text" required placeholder="Kaung"></div>
    </div>
    <div class="field"><label>Email</label><input type="email" required placeholder="you@example.com"></div>
    <div class="field"><label>Password</label><input type="password" required placeholder="Min 8 characters"></div>
    <div class="field"><label>What will you create?</label>
      <select><option>YouTube Videos</option><option>TikTok / Shorts</option><option>Faceless Content</option><option>Marketing Videos</option><option>Educational Content</option><option>Other</option></select>
    </div>
    <label class="check"><input type="checkbox" checked> I agree to the Terms of Service and Privacy Policy</label>
    <div class="benefit">✅ Free forever — 3 videos per month</div>
    <div class="benefit">✅ No credit card required</div>
    <button type="submit" class="btn">Create Free Account 🚀</button>
  </form>
  <p class="footer">Already have an account? <a href="login.html">Sign in →</a></p>
</div>

</body></html>
