<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Mg Claw Chat 🦞</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a0a0a;color:#e0e0e0;height:100dvh;display:flex;flex-direction:column}
.header{background:#111;padding:12px 16px;border-bottom:1px solid #222;display:flex;align-items:center;gap:10px}
.header h1{font-size:1.1rem;font-weight:600;color:#FF6B35}
.status{font-size:0.7rem;padding:2px 8px;border-radius:10px;background:#1a3a1a;color:#4ade80}
.status.offline{background:#3a1a1a;color:#f87171}
.chat{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.msg{max-width:85%;padding:10px 14px;border-radius:16px;line-height:1.5;font-size:0.92rem;white-space:pre-wrap;word-break:break-word}
.msg.user{align-self:flex-end;background:#FF6B35;color:#fff;border-bottom-right-radius:4px}
.msg.assistant{align-self:flex-start;background:#1a1a1a;border:1px solid #2a2a2a;border-bottom-left-radius:4px}
.msg.assistant code{background:#111;padding:2px 6px;border-radius:4px;font-size:0.82rem}
.msg.assistant pre{background:#111;padding:10px;border-radius:8px;overflow-x:auto;margin:8px 0;border:1px solid #222}
.typing{align-self:flex-start;color:#888;font-size:0.82rem;padding:8px 14px;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}
.input-area{background:#111;padding:12px 16px;border-top:1px solid #222;display:flex;gap:8px;align-items:flex-end}
.input-area textarea{flex:1;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:12px;padding:10px 14px;color:#e0e0e0;font-size:0.9rem;resize:none;outline:none;max-height:120px;line-height:1.4;font-family:inherit}
.input-area textarea:focus{border-color:#FF6B35}
.input-area button{background:#FF6B35;color:#fff;border:none;border-radius:12px;padding:10px 16px;font-size:0.85rem;font-weight:600;cursor:pointer;white-space:nowrap}
.input-area button:disabled{opacity:.5;cursor:not-allowed}
.model-bar{display:flex;gap:6px;padding:6px 16px;background:#0d0d0d;border-bottom:1px solid #1a1a1a;overflow-x:auto}
.model-btn{padding:4px 10px;border-radius:8px;border:1px solid #2a2a2a;background:transparent;color:#999;font-size:0.72rem;cursor:pointer;white-space:nowrap}
.model-btn.active{background:#FF6B3520;border-color:#FF6B35;color:#FF6B35}
.welcome{text-align:center;color:#666;padding:40px 20px}
.welcome h2{color:#FF6B35;margin-bottom:8px;font-size:1.3rem}
.welcome p{font-size:0.85rem}
.retry{color:#FF6B35;cursor:pointer;text-decoration:underline;font-size:0.8rem}
@media(max-width:480px){.msg{max-width:92%}}
</style>
</head>
<body>

<div class="header">
  <h1>🦞 Mg Claw Chat</h1>
  <span class="status" id="status">connecting...</span>
</div>

<div class="model-bar" id="models"></div>

<div class="chat" id="chat">
  <div class="welcome">
    <h2>🦞 Mg Claw</h2>
    <p>Free AI · Ollama · Zero Credits</p>
    <p style="margin-top:8px;font-size:0.78rem" id="welcomeMsg">Connecting to Ollama...</p>
  </div>
</div>

<div class="input-area">
  <textarea id="prompt" rows="1" placeholder="Type a message..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"></textarea>
  <button id="sendBtn" onclick="send()" disabled>Send</button>
</div>

<script>
// SAME origin — no CORS. The Python server proxies /api/* and /v1/* to Ollama.
const BASE = window.location.origin;
let currentModel = '';
let conversation = [];
let modelsLoaded = false;

function setStatus(text, offline) {
  const s = document.getElementById('status');
  s.textContent = text;
  s.className = 'status' + (offline ? ' offline' : '');
}

async function init() {
  try {
    const r = await fetch(BASE + '/api/tags', { signal: AbortSignal.timeout(8000) });
    const d = await r.json();
    if (!d.models || d.models.length === 0) throw new Error('No models');
    
    setStatus('free · ollama', false);
    modelsLoaded = true;
    
    const bar = document.getElementById('models');
    bar.innerHTML = '';
    currentModel = d.models[0].name;
    
    d.models.forEach(m => {
      const btn = document.createElement('button');
      btn.className = 'model-btn' + (m.name === currentModel ? ' active' : '');
      btn.textContent = m.name;
      btn.onclick = () => { 
        document.querySelectorAll('.model-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentModel = m.name;
      };
      bar.appendChild(btn);
    });
    
    document.getElementById('sendBtn').disabled = false;
    document.getElementById('welcomeMsg').textContent = 'Type anything to start';
  } catch(e) {
    setStatus('offline', true);
    document.getElementById('welcomeMsg').innerHTML = '❌ Cannot connect to Ollama<br><br><span class="retry" onclick="init()">🔄 Retry</span>';
  }
}

function addMsg(role, text) {
  const chat = document.getElementById('chat');
  document.querySelector('.welcome')?.remove();
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

async function send() {
  if (!modelsLoaded) return init();
  
  const input = document.getElementById('prompt');
  const text = input.value.trim();
  if (!text || !currentModel) return;
  
  input.value = '';
  input.style.height = 'auto';
  document.getElementById('sendBtn').disabled = true;
  
  addMsg('user', text);
  conversation.push({ role: 'user', content: text });
  
  const typingDiv = document.createElement('div');
  typingDiv.className = 'typing';
  typingDiv.textContent = 'Thinking...';
  document.getElementById('chat').appendChild(typingDiv);
  
  try {
    const res = await fetch(BASE + '/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: currentModel,
        messages: conversation,
        stream: false,
        max_tokens: 2048
      }),
      signal: AbortSignal.timeout(90000)
    });
    const data = await res.json();
    typingDiv.remove();
    
    const reply = data.choices?.[0]?.message?.content || '(no response)';
    addMsg('assistant', reply);
    conversation.push({ role: 'assistant', content: reply });
    
    if (conversation.length > 40) conversation = conversation.slice(-40);
  } catch(e) {
    typingDiv.remove();
    addMsg('assistant', '❌ Error: ' + e.message + '\n\n<span class="retry" onclick="init()">🔄 Reconnect</span>');
  }
  
  document.getElementById('sendBtn').disabled = false;
  input.focus();
}

init();
document.getElementById('prompt').focus();
</script>
</body>
</html>
